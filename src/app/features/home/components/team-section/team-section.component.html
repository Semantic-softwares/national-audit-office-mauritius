<section class="team-section">
  <div class="container mx-auto px-4">
    <div class="section-header">
      <span class="section-tag">Our Leadership</span>
      <h2 class="section-title">Meet Our <span class="highlight">Senior Team</span></h2>
      <p class="section-desc">
        Dedicated professionals committed to upholding the highest standards of public sector auditing.
      </p>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
      @for (member of members; track member.name) {
        <div class="team-card group">
          <div class="member-image-wrap">
            <img [src]="member.image" [alt]="member.name" class="member-image" loading="lazy" />
            <div class="overlay">
              <div class="overlay-links">
                <a [href]="'mailto:' + member.email" class="overlay-btn" aria-label="Email">
                  <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path d="M2.003 5.884L10 9.882l7.997-3.998A2 2 0 0016 4H4a2 2 0 00-1.997 1.884z"/><path d="M18 8.118l-8 4-8-4V14a2 2 0 002 2h12a2 2 0 002-2V8.118z"/></svg>
                </a>
                <a [href]="'tel:' + member.phone" class="overlay-btn" aria-label="Phone">
                  <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path d="M2 3a1 1 0 011-1h2.153a1 1 0 01.986.836l.74 4.435a1 1 0 01-.54 1.06l-1.548.773a11.037 11.037 0 006.105 6.105l.774-1.548a1 1 0 011.059-.54l4.435.74a1 1 0 01.836.986V17a1 1 0 01-1 1h-2C7.82 18 2 12.18 2 5V3z"/></svg>
                </a>
                <a [routerLink]="['/staff', member.slug]" class="overlay-btn" aria-label="Profile">
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                </a>
              </div>
            </div>
          </div>
          <div class="member-info">
            <h3 class="member-name">{{ member.name }}</h3>
            <p class="member-role">{{ member.role }}</p>
          </div>
        </div>
      }
    </div>

    <div class="flex justify-center mt-10">
      <a routerLink="/staff" class="view-all-btn">View All Senior Staff →</a>
    </div>
  </div>
</section>
