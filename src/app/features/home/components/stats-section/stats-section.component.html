<section class="stats-section" #sectionRef>
  <div class="container mx-auto px-4">
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-0 divide-y sm:divide-y-0 sm:divide-x divide-white/10">
      @for (stat of stats; track stat.label; let i = $index) {
        <div class="stat-card" #statEl>
          <div class="stat-icon">
            <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
            </svg>
          </div>
          <div class="stat-number-wrap">
            <span class="stat-number">{{ displayValues[i] }}</span>
            <span class="stat-suffix">{{ stat.suffix }}</span>
          </div>
          <h3 class="stat-label">{{ stat.label }}</h3>
          <p class="stat-desc">{{ stat.description }}</p>
        </div>
      }
    </div>
  </div>
</section>
