<section class="events-section">
  <div class="container mx-auto px-4">
    <div class="flex flex-col md:flex-row md:items-end justify-between gap-4 mb-10">
      <div>
        <span class="section-tag">Upcoming Events</span>
        <h2 class="section-title">Explore <span class="highlight">Upcoming NAO Events</span></h2>
      </div>
      <a routerLink="/events" class="view-all-link">
        View All Events
        <svg class="w-4 h-4 ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"/>
        </svg>
      </a>
    </div>

    <div class="events-list">
      @for (event of events; track event.slug) {
        <div class="event-card">
          <div class="event-date">
            <span class="date-day">{{ event.date.day }}</span>
            <span class="date-month">{{ event.date.month }}</span>
            <span class="date-year">{{ event.date.year }}</span>
          </div>
          <div class="event-content">
            <span class="event-category">{{ event.category }}</span>
            <h3 class="event-title">{{ event.title }}</h3>
            <div class="event-meta">
              <span class="meta-item">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                {{ event.time }}
              </span>
              <span class="meta-item">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                {{ event.location }}
              </span>
            </div>
          </div>
          <a [routerLink]="['/events', event.slug]" class="event-cta">Read More</a>
        </div>
      }
    </div>
  </div>
</section>
